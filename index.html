<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #050810;
    --panel:     #080d1a;
    --border:    #0f1e3a;
    --blue:      #00aaff;
    --blue-dim:  #004d7a;
    --blue-glow: rgba(0,170,255,0.35);
    --cyan:      #00ffe7;
    --red:       #ff3355;
    --text:      #c8deff;
    --text-dim:  #4a6080;
    --food:      #ff6b35;
    --food-glow: rgba(255,107,53,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,170,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,170,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5,8,16,0.85) 100%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 3.6rem);
    letter-spacing: 0.25em;
    color: var(--blue);
    text-shadow:
      0 0 10px var(--blue),
      0 0 30px var(--blue-glow),
      0 0 60px rgba(0,170,255,0.15);
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%,100% { text-shadow: 0 0 10px var(--blue), 0 0 30px var(--blue-glow), 0 0 60px rgba(0,170,255,0.15); }
    50%      { text-shadow: 0 0 16px var(--blue), 0 0 50px var(--blue-glow), 0 0 90px rgba(0,170,255,0.25); }
  }

  .subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ── HUD ── */
  .hud {
    display: flex;
    gap: 40px;
    align-items: center;
  }

  .hud-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--cyan);
    text-shadow: 0 0 12px rgba(0,255,231,0.5);
    min-width: 4ch;
    text-align: center;
    transition: transform 0.1s;
  }

  .hud-value.bump {
    animation: bump 0.15s ease-out;
  }

  @keyframes bump {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.35); color: var(--blue); }
    100% { transform: scale(1); }
  }

  /* ── CANVAS FRAME ── */
  .canvas-frame {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow:
      0 0 0 1px rgba(0,170,255,0.08),
      0 0 30px rgba(0,170,255,0.08),
      inset 0 0 60px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  /* corner accents */
  .canvas-frame::before,
  .canvas-frame::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: var(--blue);
    border-style: solid;
    z-index: 3;
  }
  .canvas-frame::before { top: 0; left: 0; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .canvas-frame::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  .corner-tr, .corner-bl {
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: var(--blue);
    border-style: solid;
    z-index: 3;
  }
  .corner-tr { top: 0; right: 0; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .corner-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }

  canvas {
    display: block;
  }

  /* ── OVERLAY (start / game-over) ── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: rgba(5,8,16,0.88);
    backdrop-filter: blur(4px);
    z-index: 10;
    transition: opacity 0.3s;
  }

  .overlay.hidden { opacity: 0; pointer-events: none; }

  .over-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    letter-spacing: 0.15em;
    color: var(--red);
    text-shadow: 0 0 20px rgba(255,51,85,0.6);
    animation: flickerIn 0.4s ease-out;
  }

  .over-title.start-title {
    color: var(--blue);
    text-shadow: 0 0 20px var(--blue-glow);
  }

  @keyframes flickerIn {
    0%   { opacity: 0; transform: scale(1.1); }
    60%  { opacity: 1; transform: scale(0.97); }
    100% { transform: scale(1); }
  }

  .over-score {
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 0.2em;
  }

  .over-score span {
    color: var(--cyan);
    font-size: 1.1rem;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 12px 36px;
    border: 1px solid var(--blue);
    border-radius: 3px;
    background: transparent;
    color: var(--blue);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color 0.2s, box-shadow 0.2s;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--blue);
    transform: translateX(-105%);
    transition: transform 0.25s ease;
    z-index: -1;
  }

  .btn:hover {
    color: var(--bg);
    box-shadow: 0 0 20px var(--blue-glow);
  }

  .btn:hover::before { transform: translateX(0); }

  /* ── FOOTER HINTS ── */
  .hints {
    display: flex;
    gap: 24px;
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .hints span { display: flex; align-items: center; gap: 6px; }

  .key {
    display: inline-block;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 6px;
    font-size: 0.6rem;
    color: var(--text-dim);
    background: var(--panel);
  }

  /* score bump particle */
  .particle {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    color: var(--cyan);
    pointer-events: none;
    animation: floatUp 0.7s ease-out forwards;
    z-index: 20;
    text-shadow: 0 0 8px var(--cyan);
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-50px) scale(0.7); }
  }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="title">SNAKE</div>
    <div class="subtitle">Neural Edition &nbsp;·&nbsp; v2.0</div>
  </header>

  <div class="hud">
    <div class="hud-block">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="scoreDisplay">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Best</div>
      <div class="hud-value" id="bestDisplay">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Level</div>
      <div class="hud-value" id="levelDisplay">1</div>
    </div>
  </div>

  <div class="canvas-frame" id="frame">
    <div class="corner-tr"></div>
    <div class="corner-bl"></div>
    <canvas id="c"></canvas>

    <div class="overlay" id="overlay">
      <div class="over-title start-title" id="overlayTitle">READY</div>
      <div class="over-score" id="overlayScore"></div>
      <button class="btn" id="overlayBtn">START GAME</button>
    </div>
  </div>

  <div class="hints">
    <span><span class="key">↑↓←→</span> Move</span>
    <span><span class="key">P</span> Pause</span>
    <span><span class="key">R</span> Restart</span>
  </div>
</div>

<script>
(() => {
  // ── CONFIG ──────────────────────────────────────────────
  const COLS = 24, ROWS = 24, CELL = 24;
  const BASE_INTERVAL = 130; // ms per tick

  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;

  const overlay      = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayScore = document.getElementById('overlayScore');
  const overlayBtn   = document.getElementById('overlayBtn');
  const scoreEl      = document.getElementById('scoreDisplay');
  const bestEl       = document.getElementById('bestDisplay');
  const levelEl      = document.getElementById('levelDisplay');
  const frame        = document.getElementById('frame');

  // ── STATE ────────────────────────────────────────────────
  let snake, dir, nextDir, food, score, best, level, interval;
  let running = false, paused = false, dead = false;

  // ── COLORS ──────────────────────────────────────────────
  const C = {
    bg:        '#050810',
    gridLine:  'rgba(0,170,255,0.04)',
    headFill:  '#00aaff',
    headGlow:  'rgba(0,170,255,0.8)',
    bodyFill:  (i, len) => {
      const t = i / len;
      const r = Math.round(0   + t * 0);
      const g = Math.round(170 - t * 100);
      const b = Math.round(255 - t * 80);
      return `rgb(${r},${g},${b})`;
    },
    food:      '#ff6b35',
    foodGlow:  'rgba(255,107,53,0.8)',
    foodInner: '#ffcc00',
  };

  // ── INIT ─────────────────────────────────────────────────
  function init() {
    snake   = [{ x: 12, y: 12 }, { x: 11, y: 12 }, { x: 10, y: 12 }];
    dir     = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score   = 0;
    level   = 1;
    dead    = false;
    spawnFood();
    updateHUD();
    clearInterval(interval);
    interval = setInterval(tick, getSpeed());
    draw();
  }

  function getSpeed() { return Math.max(55, BASE_INTERVAL - (level - 1) * 12); }

  function spawnFood() {
    let pos;
    do {
      pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  // ── GAME LOOP ────────────────────────────────────────────
  function tick() {
    if (!running || paused || dead) return;

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += level * 10;
      if (score > best) best = score;
      if (score % 50 === 0 && score > 0) { level++; resetInterval(); }
      spawnFood();
      bumpScore();
      spawnParticle(head);
    } else {
      snake.pop();
    }

    updateHUD();
    draw();
  }

  function resetInterval() {
    clearInterval(interval);
    interval = setInterval(tick, getSpeed());
  }

  function gameOver() {
    dead = true;
    running = false;
    clearInterval(interval);

    // flash effect
    let flashes = 0;
    const flashInt = setInterval(() => {
      ctx.fillStyle = flashes % 2 === 0 ? 'rgba(255,51,85,0.12)' : 'transparent';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (++flashes > 5) clearInterval(flashInt);
    }, 80);

    setTimeout(() => {
      overlayTitle.textContent = 'GAME OVER';
      overlayTitle.className   = 'over-title';
      overlayScore.innerHTML   = `Score <span>${score}</span> &nbsp;|&nbsp; Best <span>${best}</span>`;
      overlayBtn.textContent   = 'PLAY AGAIN';
      overlay.classList.remove('hidden');
    }, 500);
  }

  // ── DRAW ─────────────────────────────────────────────────
  function draw() {
    // background
    ctx.fillStyle = C.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // grid
    ctx.strokeStyle = C.gridLine;
    ctx.lineWidth   = 0.5;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
    }

    // food
    drawFood();

    // snake
    snake.forEach((s, i) => {
      const isHead = i === 0;
      const margin = isHead ? 1 : 2;
      const radius = isHead ? 5 : 4;
      const x = s.x * CELL + margin;
      const y = s.y * CELL + margin;
      const w = CELL - margin * 2;

      if (isHead) {
        // glow
        ctx.save();
        ctx.shadowColor = C.headGlow;
        ctx.shadowBlur  = 14;
        ctx.fillStyle   = C.headFill;
        roundRect(ctx, x, y, w, w, radius);
        ctx.fill();
        ctx.restore();

        // eye(s)
        const eyeSize = 3;
        const ex = x + (dir.x === 1 ? w - 7 : dir.x === -1 ? 4 : w / 2 - eyeSize / 2);
        const ey = y + (dir.y === 1 ? w - 7 : dir.y === -1 ? 4 : w / 2 - eyeSize / 2);
        ctx.fillStyle = 'rgba(5,8,16,0.85)';
        ctx.beginPath(); ctx.arc(ex, ey, eyeSize * 0.9, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex - 0.5, ey - 0.5, 1.2, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.fillStyle = C.bodyFill(i, snake.length);
        roundRect(ctx, x, y, w, w, radius);
        ctx.fill();
        // subtle inner highlight
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        roundRect(ctx, x + 2, y + 2, w - 4, (w - 4) * 0.4, 2);
        ctx.fill();
      }
    });
  }

  function drawFood() {
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200);
    const px = food.x * CELL + CELL / 2;
    const py = food.y * CELL + CELL / 2;
    const r  = CELL / 2 - 3;

    ctx.save();
    ctx.shadowColor = C.foodGlow;
    ctx.shadowBlur  = 10 + pulse * 8;

    // outer ring
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(px - 2, py - 2, 1, px, py, r);
    grad.addColorStop(0, C.foodInner);
    grad.addColorStop(1, C.food);
    ctx.fillStyle = grad;
    ctx.fill();

    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(px - 2.5, py - 2.5, r * 0.35, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── HUD ─────────────────────────────────────────────────
  function updateHUD() {
    scoreEl.textContent = score;
    bestEl.textContent  = best;
    levelEl.textContent = level;
  }

  function bumpScore() {
    scoreEl.classList.remove('bump');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('bump');
  }

  // ── PARTICLES ───────────────────────────────────────────
  function spawnParticle(cell) {
    const rect   = canvas.getBoundingClientRect();
    const frRect = frame.getBoundingClientRect();
    const px = rect.left - frRect.left + cell.x * CELL + CELL / 2;
    const py = rect.top  - frRect.top  + cell.y * CELL;
    const el = document.createElement('div');
    el.className   = 'particle';
    el.textContent = `+${level * 10}`;
    el.style.left  = px + 'px';
    el.style.top   = py + 'px';
    frame.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  // animate food continuously
  let rafId;
  function foodLoop() {
    if (running && !paused && !dead) drawFood(); // redraw food glow on canvas
    rafId = requestAnimationFrame(foodLoop);
  }

  // ── INPUT ────────────────────────────────────────────────
  const KEYS = {
    ArrowUp:    { x: 0,  y: -1 },
    ArrowDown:  { x: 0,  y:  1 },
    ArrowLeft:  { x: -1, y:  0 },
    ArrowRight: { x: 1,  y:  0 },
    w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
    a: { x: -1,y:  0 }, A: { x: -1,y:  0 },
    d: { x: 1, y:  0 }, D: { x: 1, y:  0 },
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'p' || e.key === 'P') {
      if (!running || dead) return;
      paused = !paused;
      return;
    }
    if (e.key === 'r' || e.key === 'R') {
      if (running || dead) { restart(); return; }
    }
    const d = KEYS[e.key];
    if (!d) return;
    e.preventDefault();
    // prevent 180° reversal
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
  });

  // ── BUTTON ───────────────────────────────────────────────
  overlayBtn.addEventListener('click', () => {
    overlay.classList.add('hidden');
    best = best || 0;
    restart();
  });

  function restart() {
    overlay.classList.add('hidden');
    running = true;
    paused  = false;
    init();
  }

  // ── BOOT ─────────────────────────────────────────────────
  best = 0;
  // draw idle frame
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // pulse the canvas frame border on idle
  let pulse = 0;
  setInterval(() => {
    if (running && !dead) return;
    pulse = Date.now();
  }, 100);

  foodLoop();

})();
</script>
</body>
</html>
